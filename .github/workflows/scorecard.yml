# Individual repo: .github/workflows/scorecard.yml
#
# OpenSSF Scorecard — scans the repo against ~18 security best-practice
# checks (branch protection, signed releases, dependency-review, no binary
# artifacts in repo, etc.) and produces a score 0-10.
#
# Trust signal for OSS consumers. Scorecard's checks are OpenSSF's research
# output; reimplementing them would mean re-deriving an external project.
# We wrap the marketplace action.
#
# Batch 4.3 from tmp/plan-future-workflows.md.
name: 🔬 OpenSSF Scorecard

on:
    branch_protection_rule:
    schedule:
        - cron: "32 7 * * 1" # weekly Monday 07:32 UTC
    push:
        branches: [master, main]
    workflow_dispatch:

permissions: read-all

jobs:
    analyze:
        runs-on: ubuntu-latest
        permissions:
            security-events: write
            id-token: write # publish to OpenSSF transparency log
            contents: read
        steps:
            - name: Checkout
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4
              with:
                  persist-credentials: false

            - name: Run Scorecard
              # SHA-pinned to v2.4.3 (published 2025-09-30). There is no v3.x;
              # the action has never released past v2.4.x — `@v3.4.0` was a
              # fabricated tag and fails to resolve. Re-verify against
              # https://github.com/ossf/scorecard-action/releases before bumping.
              uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
              with:
                  results_file: results.sarif
                  results_format: sarif
                  publish_results: true

            - name: Upload SARIF
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: results.sarif
                  category: scorecard
