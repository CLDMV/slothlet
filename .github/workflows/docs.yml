# Individual repo: .github/workflows/docs.yml
#
# Builds docs and pushes to gh-pages branch on master push. Only adopt this
# template in repos that actually publish docs (e.g. @cldmv/slothlet).
#
# Batch 6.1 from tmp/plan-future-workflows.md.
name: 📖 Publish Docs

on:
    push:
        branches: [master, main]
        paths:
            - "docs/**"
            - "src/**/*.{js,mjs,ts}" # if docs are generated from source (JSDoc/TypeDoc)
            - "**/*.md"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    publish:
        uses: CLDMV/.github/.github/workflows/reusable-docs-publish.yml@v4
        with:
            build_command: "npm run docs:build"
            output_dir: "docs/generated"
            # cname: "docs.cldmv.net"   # uncomment for custom domain
        secrets:
            BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
            BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
            TAGGER_NAME: ${{ secrets.CLDMV_BOT_NAME }}
            TAGGER_EMAIL: ${{ secrets.CLDMV_BOT_EMAIL }}
