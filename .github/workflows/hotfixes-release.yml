# Individual repo: .github/workflows/hotfixes-release.yml
#
# v4 hotfix lane: maintain the ONE persistent `hotfixes → master` release PR.
#
# Mirror of next-release.yml but for the `hotfixes` integration branch
# (CLDMV/.github docs/conventions/release-flow-v4.md §5.4, §6.2). Fires on
# every push to `hotfixes` (hotfix/security PR squash-merges land here), and
# resolves-or-creates the persistent `hotfixes → master` release PR. Patches
# the current release independently of whatever is pending on `next`.
#
# Same model as the next lane: the version bump rides on `hotfixes` as a
# `chore: bump version` commit, carried to master through the squash (§8.1).
name: 🚑 Hotfixes Release (v4)

on:
    push:
        branches: [hotfixes]
    workflow_dispatch: # manual kick to open/refresh the release PR for content already on the branch

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: hotfixes-release-${{ github.repository }}
    cancel-in-progress: false

jobs:
    plan:
        # Loop guard: the `chore: bump version` message guard is the real loop-break; reset/force-reset
        # pushes still run `plan` but no-op because `detect` finds no `master..hotfixes` changes. Do NOT
        # gate on `github.actor`: dependabot security PRs are auto-merged into `hotfixes` by cldmv-bot, so
        # every push here is a bot merge — gating on the actor skipped the whole lane and the
        # `hotfixes → master` release PR was never opened. `workflow_dispatch` runs bypass the guard.
        if: |
            github.event_name != 'push' ||
            !startsWith(github.event.head_commit.message, 'chore: bump version')
        name: "🔍 Plan (detect changes + resolve PR)"
        runs-on: ubuntu-latest
        outputs:
            has-changes: ${{ steps.detect.outputs.has-changes }}
            pr-number: ${{ steps.resolve.outputs.pr-number }}
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Checkout hotfixes
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4
              with:
                  ref: hotfixes
                  fetch-depth: 0

            - name: Detect master..hotfixes changes
              id: detect
              shell: bash
              run: |
                  git fetch origin master --quiet
                  count=$(git rev-list --count origin/master..HEAD)
                  echo "📊 commits on hotfixes not yet on master: $count"
                  if [ "$count" -gt 0 ]; then
                      echo "has-changes=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "has-changes=false" >> "$GITHUB_OUTPUT"
                      echo "ℹ️ hotfixes is in sync with master — nothing to release."
                  fi

            - name: Resolve persistent hotfixes→master PR
              id: resolve
              if: steps.detect.outputs.has-changes == 'true'
              shell: bash
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head hotfixes --base master \
                       --state open --json number --jq '.[0].number // ""')
                  echo "pr-number=$pr" >> "$GITHUB_OUTPUT"
                  if [ -n "$pr" ]; then
                      echo "🔁 existing hotfix release PR: #$pr — will refresh"
                  else
                      echo "🆕 no hotfix release PR yet — will create"
                  fi

    create:
        name: "🆕 Create hotfix release PR"
        needs: plan
        if: needs.plan.outputs.has-changes == 'true' && needs.plan.outputs.pr-number == ''
        runs-on: ubuntu-latest
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            # Customize `package-name` + `build-command` to match this repo —
            # see notes in next-release.yml.
            - name: Create release PR
              uses: CLDMV/.github/.github/actions/github/jobs/create-release-pr@v4
              with:
                  package-name: "@cldmv/slothlet"
                  build-command: "npm run build:ci"
                  github-token: ${{ steps.app-token.outputs.token }}

    refresh:
        name: "🔁 Refresh hotfix release PR #${{ needs.plan.outputs.pr-number }}"
        needs: plan
        if: needs.plan.outputs.has-changes == 'true' && needs.plan.outputs.pr-number != ''
        runs-on: ubuntu-latest
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Refresh release PR
              uses: CLDMV/.github/.github/actions/github/jobs/update-release-pr@v4
              with:
                  head-ref: hotfixes
                  pr-number: ${{ needs.plan.outputs.pr-number }}
                  package-name: "@cldmv/slothlet"
                  build-command: "npm run build:ci"
                  github-token: ${{ steps.app-token.outputs.token }}
