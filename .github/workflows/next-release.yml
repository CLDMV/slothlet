# Individual repo: .github/workflows/next-release.yml
#
# v4 core: maintain the ONE persistent `next → master` release PR for this repo.
#
# Fires on every push to `next` (contributor PR squash-merges land here).
# Resolves the existing release PR and refreshes it, or creates it the first
# time `next` diverges from master. The release PR batches all accumulated
# feature commits into a single release — that batching is v4's whole point
# (see CLDMV/.github docs/conventions/release-flow-v4.md §5.3, §6.1).
#
# The version bump rides on `next` as a `chore: bump version` commit pushed
# by the release-PR machinery; it's carried to master through the squash
# (§8.1 — master accepts changes only via PR squash, and the publish flow
# reads package.json as-is).
name: 🚀 Next Release (v4)

on:
    push:
        branches: [next]

permissions:
    contents: write
    pull-requests: write

# Serialize: each run re-resolves the current PR state, so queueing (not
# cancelling) avoids a create/refresh race when pushes land back-to-back.
concurrency:
    group: next-release-${{ github.repository }}
    cancel-in-progress: false

jobs:
    plan:
        # Loop guard: the refresh/create steps push a `chore: bump version`
        # commit to `next` (as the bot), and next-reset.yml force-pushes
        # `next` (as the bot). Neither should re-trigger a release-PR refresh.
        # Replace `cldmv-bot[bot]` with your bot App's login if different.
        if: |
            github.actor != 'cldmv-bot[bot]' &&
            github.actor != 'github-actions[bot]' &&
            !startsWith(github.event.head_commit.message, 'chore: bump version')
        name: "🔍 Plan (detect changes + resolve PR)"
        runs-on: ubuntu-latest
        outputs:
            has-changes: ${{ steps.detect.outputs.has-changes }}
            pr-number: ${{ steps.resolve.outputs.pr-number }}
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Checkout next
              uses: CLDMV/.github/.github/actions/common/steps/checkout-code@v4
              with:
                  ref: next
                  fetch-depth: 0

            - name: Detect master..next changes
              id: detect
              shell: bash
              run: |
                  git fetch origin master --quiet
                  count=$(git rev-list --count origin/master..HEAD)
                  echo "📊 commits on next not yet on master: $count"
                  if [ "$count" -gt 0 ]; then
                      echo "has-changes=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "has-changes=false" >> "$GITHUB_OUTPUT"
                      echo "ℹ️ next is in sync with master — nothing to release."
                  fi

            - name: Resolve persistent next→master PR
              id: resolve
              if: steps.detect.outputs.has-changes == 'true'
              shell: bash
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # The persistent release PR is the open PR with head=next,
                  # base=master. There is at most one (concurrency-serialized).
                  pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head next --base master \
                       --state open --json number --jq '.[0].number // ""')
                  echo "pr-number=$pr" >> "$GITHUB_OUTPUT"
                  if [ -n "$pr" ]; then
                      echo "🔁 existing release PR: #$pr — will refresh"
                  else
                      echo "🆕 no release PR yet — will create"
                  fi

    create:
        name: "🆕 Create release PR"
        needs: plan
        if: needs.plan.outputs.has-changes == 'true' && needs.plan.outputs.pr-number == ''
        runs-on: ubuntu-latest
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            # Runs on the `next` ref → create-release-pr opens next → master and
            # pushes the chore-bump commit to next. Customize:
            #   - `package-name`  → your npm package (or any unique identifier)
            #   - `build-command` → your build script, or a stub like
            #                       `echo '✓ no build step'` for a meta package
            - name: Create release PR
              uses: CLDMV/.github/.github/actions/github/jobs/create-release-pr@v4
              with:
                  package-name: "@cldmv/slothlet"
                  build-command: "npm run build:ci"
                  github-token: ${{ steps.app-token.outputs.token }}

    refresh:
        name: "🔁 Refresh release PR #${{ needs.plan.outputs.pr-number }}"
        needs: plan
        if: needs.plan.outputs.has-changes == 'true' && needs.plan.outputs.pr-number != ''
        runs-on: ubuntu-latest
        steps:
            - name: Create App token
              id: app-token
              uses: CLDMV/.github/.github/actions/github/steps/create-app-token@v4
              with:
                  client_id: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  private_key: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}
              env:
                  BOT_APP_CLIENT_ID: ${{ secrets.CLDMV_BOT_APP_CLIENT_ID }}
                  BOT_APP_PRIVATE_KEY: ${{ secrets.CLDMV_BOT_APP_PRIVATE_KEY }}

            - name: Refresh release PR
              uses: CLDMV/.github/.github/actions/github/jobs/update-release-pr@v4
              with:
                  head-ref: next
                  pr-number: ${{ needs.plan.outputs.pr-number }}
                  package-name: "@cldmv/slothlet"
                  build-command: "npm run build:ci"
                  github-token: ${{ steps.app-token.outputs.token }}
